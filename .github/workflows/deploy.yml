name: Deploy to Hostinger

on:
  push:
    branches:
      - main # O master, a seconda del nome del tuo branch principale

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Ottieni il codice (Checkout)
        uses: actions/checkout@v4

      - name: ⚙️ Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Usa una versione recente di Node
          cache: 'npm'

      - name: 📦 Installa le dipendenze
        run: npm ci

      - name: 🛠️ Costruisci il progetto (Build)
        run: npm run build

      - name: 🚀 Carica i file su Hostinger (Deploy via FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # Carica solo la cartella di build
          server-dir: ./public_html/ # Cartella di destinazione su Hostinger (modificala se necessario)
